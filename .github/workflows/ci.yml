name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Python — unit + integration + web API tests
  # ---------------------------------------------------------------------------
  test-python:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: sudo apt-get install -y libportaudio2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # --frozen fails CI if uv.lock is out of sync with pyproject.toml.
        # If you change pyproject.toml, run `uv lock` locally and commit the
        # updated uv.lock in the same PR.
        run: uv sync --extra dev --extra web --extra planner --frozen

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Frontend — Vitest component tests
  # ---------------------------------------------------------------------------
  test-frontend:
    name: vitest (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit
