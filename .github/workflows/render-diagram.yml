name: Render Architecture Diagram

on:
  push:
    branches:
      - main
    paths:
      - docs/architecture.mmd
  pull_request:
    paths:
      - docs/architecture.mmd

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Render diagram to SVG
        run: mmdc -i docs/architecture.mmd -o docs/architecture.svg -b transparent

      - name: Commit rendered SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/architecture.svg
          git diff --cached --quiet || git commit -m "chore: re-render architecture diagram [skip ci]"
          git push
