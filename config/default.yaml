stt:
  provider: groq          # groq | whisper_local
  model: whisper-large-v3-turbo
  language: en

tts:
  provider: edge_tts      # edge_tts | piper
  voice: en-US-AriaNeural

llm:
  provider: litellm
  model: groq/meta-llama/llama-4-scout-17b-16e-instruct
  temperature: 0.7
  max_tokens: 1024
  streaming: true

interview:
  type: behavioral        # behavioral | technical | hr | system_design
  difficulty: mid         # entry | mid | senior | staff
  num_questions: 5
  time_limit_per_question: 120  # seconds
  persona: neutral        # friendly | neutral | adversarial
  language: en
  mode: pipeline          # pipeline | live  (see docs/decisions/005-dual-path-interview-engine.md)

live_llm:
  provider: gemini_live   # placeholder — not yet implemented
  model: ""

paths:
  question_bank: config/questions
  session_store: .interviewd/sessions

log_level: INFO
