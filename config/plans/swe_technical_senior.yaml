skills_analysis:
  required_skills:
    - System design
    - Data structures and algorithms
    - Distributed systems
    - Code quality and testing
    - Debugging and performance
  skill_gaps: []
  summary: >
    Standard senior SWE technical plan covering system design, algorithms, and
